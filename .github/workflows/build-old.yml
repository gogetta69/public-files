name: Build Linux Executable

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # This adds the manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build executable in CentOS 6
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: build-image:latest

    - name: Run the build container
      run: docker run --rm -v ${{ github.workspace }}:/app build-image:latest

    - name: Upload built executable
      uses: actions/upload-artifact@v3
      with:
        name: thetvapp-linux
        path: ./thetvapp-linux
