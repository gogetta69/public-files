name: Build Linux Executable

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # This adds the manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci --force
        else
          npm install --force
        fi

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm python3

    - name: Install nexe
      run: npm install -g nexe

    - name: Build executable with nexe
      run: nexe thetvapp-win64.js -t linux-x64-20.13.1 -o thetvapp-linux --build

    - name: Upload built executable
      uses: actions/upload-artifact@v2
      with:
        name: thetvapp-linux
        path: thetvapp-linux
